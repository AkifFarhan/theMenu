services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: theMenu
        APP_ENV: local
        APP_DEBUG: 'true'
        DB_CONNECTION: sqlsrv
        DB_HOST: db
        DB_PORT: 1433
        DB_DATABASE: themenu
        DB_USERNAME: sa
        DB_PASSWORD: Password123!
    image: themenu_app:latest
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: theMenu
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlsrv
      DB_HOST: db
      DB_PORT: 1433
      DB_DATABASE: themenu
      DB_USERNAME: sa
      DB_PASSWORD: Password123!
      DB_TRUST_SERVER_CERTIFICATE: 'true'
    volumes:
      - ./server:/var/www/html:delegated
      - ./client:/var/www/html/client:delegated
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "Password123!", "-Q", "SELECT 1",
             "-C"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  db_data: